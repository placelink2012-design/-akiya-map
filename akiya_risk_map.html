<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空き家リスクマップ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
    #map { position:fixed; top:0; bottom:0; left:0; right:0; }
    .panel {
      position:fixed; z-index:1000;
      background:rgba(255,255,255,0.97);
      border-radius:8px; border:1px solid #bbb;
      box-shadow:2px 2px 8px rgba(0,0,0,0.2);
      font-family:sans-serif; font-size:12px;
    }
    .ph { font-weight:bold; font-size:13px; border-bottom:2px solid #555;
          padding-bottom:4px; margin-bottom:8px; }
    .sl { font-size:11px; font-weight:bold; color:#444; margin-bottom:4px; }
    label.cl { display:block; margin-bottom:2px; cursor:pointer; }
  </style>
</head>
<body>
<div id="map"></div>

<!-- タイトル -->
<div style="position:fixed;top:10px;left:50%;transform:translateX(-50%);
            z-index:1100;background:rgba(255,255,255,0.93);padding:8px 20px;
            border-radius:6px;border:1px solid #aaa;font-size:15px;font-weight:bold;
            pointer-events:none;white-space:nowrap;font-family:sans-serif">
  空き家リスクマップ
</div>

<!-- ズームインジケーター -->
<div style="position:fixed;bottom:20px;right:10px;z-index:1100;
     background:rgba(255,255,255,0.93);padding:6px 12px;border-radius:6px;
     border:1px solid #aaa;font-family:sans-serif;font-size:12px;
     pointer-events:none">
  ズーム: <span id="zoom-value" style="font-weight:bold">14</span>
</div>

<!-- 右上コントロールパネル -->
<div class="panel" style="top:10px;right:10px;padding:10px 12px;width:200px;max-height:90vh;overflow-y:auto">
  <div class="ph">レイヤー制御</div>

  <div class="sl">ベースマップ</div>
  <label class="cl">
    <input type="radio" name="basemap" value="aerial" checked
           onchange="switchBasemap(this.value)"> 航空写真
  </label>
  <label class="cl" style="margin-bottom:8px">
    <input type="radio" name="basemap" value="street"
           onchange="switchBasemap(this.value)"> 標準地図
  </label>

  <div class="sl">エリア別建物（OSM）</div>
  <label class="cl" style="margin-bottom:4px">
    <input type="checkbox" id="chk-area-bounds" checked
           onchange="toggleLayer(areaGridLayer, this.checked)"> エリア境界線
  </label>
  <label class="cl"><input type="checkbox" id="chk-nw" onchange="toggleMuni('nw',this.checked)"> 北西エリア</label>
  <div id="status-nw" style="font-size:10px;color:#888;margin:0 0 3px 18px"></div>
  <label class="cl"><input type="checkbox" id="chk-ne" onchange="toggleMuni('ne',this.checked)"> 北東エリア</label>
  <div id="status-ne" style="font-size:10px;color:#888;margin:0 0 3px 18px"></div>
  <label class="cl"><input type="checkbox" id="chk-cw" onchange="toggleMuni('cw',this.checked)"> 中西エリア</label>
  <div id="status-cw" style="font-size:10px;color:#888;margin:0 0 3px 18px"></div>
  <label class="cl"><input type="checkbox" id="chk-ce" onchange="toggleMuni('ce',this.checked)"> 中東エリア</label>
  <div id="status-ce" style="font-size:10px;color:#888;margin:0 0 3px 18px"></div>
  <label class="cl"><input type="checkbox" id="chk-sw" onchange="toggleMuni('sw',this.checked)"> 南西エリア</label>
  <div id="status-sw" style="font-size:10px;color:#888;margin:0 0 3px 18px"></div>
  <label class="cl"><input type="checkbox" id="chk-se" onchange="toggleMuni('se',this.checked)"> 南東エリア</label>
  <div id="status-se" style="font-size:10px;color:#888;margin:0 0 6px 18px"></div>
  <label class="cl">
    <input type="checkbox" id="chk-risk-high" onchange="_applyVisibility()"> リスク高のみ表示
  </label>
  <div style="font-size:10px;color:#888;margin:2px 0 8px 4px">※ズーム16以上で表示</div>

  <div class="sl">その他</div>
  <label class="cl">
    <input type="checkbox" id="chk-mixed" checked
           onchange="toggleLayer(mixedGridLayer, this.checked)"> 混在リスクグリッド
  </label>
  <div id="status-mixed" style="font-size:10px;color:#888;margin:0 0 4px 18px"></div>
  <label class="cl" style="margin-bottom:8px">
    <input type="checkbox" id="chk-akiya" checked
           onchange="toggleLayer(akiyaLayer, this.checked)"> 空き家マップ ピン
  </label>

</div>


<!-- 凡例 -->
<div class="panel" style="bottom:20px;left:10px;padding:10px 14px;line-height:2.0">
  <b style="font-size:12px">建物敷地面積</b><br>
  <span style="display:inline-block;width:14px;height:14px;background:#E24B4A;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 広（100㎡以上）リスク高<br>
  <span style="display:inline-block;width:14px;height:14px;background:#EF9F27;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 中（60〜100㎡）リスク中<br>
  <span style="display:inline-block;width:14px;height:14px;background:#1D9E75;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 小（60㎡未満）リスク低<br>
  <span style="display:inline-block;width:14px;height:14px;background:rgba(155,48,255,0.45);vertical-align:middle;border-radius:2px;margin-right:4px;border:1px solid #9B30FF"></span>混在（広＋小 100mグリッド）<br>
  <hr style="margin:4px 0">
  <small style="color:#666">建物ポリゴン: OpenStreetMap</small>
</div>

<script>
// ── マップ初期化 ─────────────────────────────────────────────
var map = L.map('map', {center: [26.155, 127.675], zoom: 14});
window.addEventListener('load', function() { map.invalidateSize(); });
map.on('zoom', _updateZoomIndicator);
map.on('zoomend', function() { _applyVisibility(); _updateZoomIndicator(); });

// ── ベースマップ ─────────────────────────────────────────────
var aerialLayer = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {attribution: 'Esri World Imagery', maxZoom: 20}
).addTo(map);

var streetLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution: 'CartoDB', subdomains: 'abcd', maxZoom: 20}
);

// ── エリア別建物ポリゴン (OSM Overpass API) ──────────────────
// 全体bbox 26.05,127.62,26.28,127.87 を3行×2列に均等分割
// 緯度境界: 26.05 / 26.1267 / 26.2033 / 26.28
// 経度境界: 127.62 / 127.745 / 127.87
var MUNIS = {
  nw: { label:'北西エリア', bbox:'26.2033,127.62,26.28,127.745',  polygons:[], layer:null, loaded:false, loading:false },
  ne: { label:'北東エリア', bbox:'26.2033,127.745,26.28,127.87',  polygons:[], layer:null, loaded:false, loading:false },
  cw: { label:'中西エリア', bbox:'26.1267,127.62,26.2033,127.745',polygons:[], layer:null, loaded:false, loading:false },
  ce: { label:'中東エリア', bbox:'26.1267,127.745,26.2033,127.87',polygons:[], layer:null, loaded:false, loading:false },
  sw: { label:'南西エリア', bbox:'26.05,127.62,26.1267,127.745',  polygons:[], layer:null, loaded:false, loading:false },
  se: { label:'南東エリア', bbox:'26.05,127.745,26.1267,127.87',  polygons:[], layer:null, loaded:false, loading:false }
};

var _overpassEndpoint = 'https://overpass-api.de/api/interpreter';

function calcAreaM2(latLngs) {
  var LAT_M = 111000;
  var LNG_M = 111000 * Math.cos(26.15 * Math.PI / 180);
  var n = latLngs.length;
  var area = 0;
  for (var i = 0; i < n; i++) {
    var j = (i + 1) % n;
    area += (latLngs[i][1] * LNG_M) * (latLngs[j][0] * LAT_M)
          - (latLngs[j][1] * LNG_M) * (latLngs[i][0] * LAT_M);
  }
  return Math.abs(area) / 2;
}

function _setMuniStatus(key, color, html) {
  var el = document.getElementById('status-' + key);
  if (!el) return;
  el.style.color = color;
  el.innerHTML = html;
}

function _retryBtn(key) {
  return ' <button onclick="retryMuni(\'' + key + '\')" ' +
    'style="font-size:10px;cursor:pointer;padding:1px 4px;border:1px solid #c00;' +
    'border-radius:3px;background:white;color:#c00">再試行</button>';
}

function toggleMuni(key, show) {
  var m = MUNIS[key];
  if (!m) return;
  if (show) {
    if (m.loaded) {
      _applyVisibility();
    } else if (!m.loading) {
      _loadMuniBuildings(key);
    }
  } else {
    if (m.layer) map.removeLayer(m.layer);
  }
}

function retryMuni(key) {
  var cb = document.getElementById('chk-' + key);
  if (cb && cb.checked) {
    MUNIS[key].loading = false;
    _loadMuniBuildings(key);
  }
}

function _loadMuniBuildings(key) {
  var m = MUNIS[key];
  m.loading = true;
  _setMuniStatus(key, '#888', '読み込み中...');

  var query = [
    '[out:json][timeout:90];',
    'way["building"](' + m.bbox + ');',
    'out body;',
    '>;',
    'out skel qt;'
  ].join('\n');

  var xhr = new XMLHttpRequest();
  xhr.open('GET', _overpassEndpoint + '?data=' + encodeURIComponent(query), true);
  xhr.timeout = 100000;

  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status >= 200 && xhr.status < 300) {
      var data;
      try { data = JSON.parse(xhr.responseText); }
      catch(e) {
        m.loading = false;
        _setMuniStatus(key, '#c00', 'パースエラー' + _retryBtn(key));
        console.error(m.label + ' parse error:', e);
        return;
      }
      if (!data.elements) {
        m.loading = false;
        _setMuniStatus(key, '#c00', 'データなし' + _retryBtn(key));
        return;
      }
      _renderMuniBuildings(key, data);
    } else {
      m.loading = false;
      _setMuniStatus(key, '#c00', 'HTTP ' + xhr.status + _retryBtn(key));
      console.error(m.label + ' XHR error:', xhr.status);
    }
  };

  xhr.ontimeout = function() {
    m.loading = false;
    _setMuniStatus(key, '#c00', 'タイムアウト' + _retryBtn(key));
    console.error(m.label + ' timeout');
  };

  xhr.onerror = function() {
    m.loading = false;
    _setMuniStatus(key, '#c00', 'ネットワークエラー' + _retryBtn(key));
    console.error(m.label + ' network error');
  };

  xhr.send();
}

function _renderMuniBuildings(key, data) {
  var m = MUNIS[key];
  var nodes = {};
  data.elements.forEach(function(el) {
    if (el.type === 'node') nodes[el.id] = [el.lat, el.lon];
  });

  m.polygons = [];
  var count = 0, skipped = 0, cH = 0, cM = 0, cL = 0;

  data.elements.forEach(function(el) {
    if (el.type !== 'way' || !el.nodes || el.nodes.length < 4) return;
    var coords = el.nodes.slice(0, -1).map(function(id) { return nodes[id]; }).filter(Boolean);
    if (coords.length < 3) { skipped++; return; }
    var area = calcAreaM2(coords);
    if (area <= 0 || area > 100000) { skipped++; return; }
    var cat, color, catLabel;
    if (area >= 100) {
      cat = 'high'; color = '#E24B4A'; catLabel = '広（100㎡以上）'; cH++;
    } else if (area >= 60) {
      cat = 'mid';  color = '#EF9F27'; catLabel = '中（60〜100㎡）'; cM++;
    } else {
      cat = 'low';  color = '#1D9E75'; catLabel = '小（60㎡未満）';  cL++;
    }
    var cLat = 0, cLng = 0;
    coords.forEach(function(c) { cLat += c[0]; cLng += c[1]; });
    cLat /= coords.length; cLng /= coords.length;
    var poly = L.polygon(coords, {
      color: '#fff', weight: 0.5, fillColor: color, fillOpacity: 0.65
    }).bindTooltip(Math.round(area) + '㎡ — ' + catLabel, { sticky: true });
    m.polygons.push({ poly: poly, cat: cat, lat: cLat, lng: cLng });
    count++;
  });

  m.layer = L.layerGroup();
  m.loaded = true;
  m.loading = false;

  var cb = document.getElementById('chk-' + key);
  if (cb && cb.checked) _applyVisibility();
  _updateMixedGrid();

  _setMuniStatus(key, '#1a7a4a', count.toLocaleString() + '棟');
  console.log(m.label + ': 計' + count + '棟 (赤' + cH + '/橙' + cM + '/緑' + cL + '), スキップ' + skipped);
}

function _applyVisibility() {
  var zoom = Math.round(map.getZoom()); // 小数zoom対策
  var riskHighOnly = document.getElementById('chk-risk-high').checked;
  Object.keys(MUNIS).forEach(function(key) {
    var m = MUNIS[key];
    if (!m.loaded || !m.layer) return;
    var cb = document.getElementById('chk-' + key);
    var areaOn = cb && cb.checked;

    if (!areaOn || zoom < 16) {
      map.removeLayer(m.layer);
      return;
    }

    // ズームとフィルターに応じてポリゴンを再構築
    m.layer.clearLayers();
    m.polygons.forEach(function(item) {
      var show = (item.cat === 'high') ||
                 (item.cat !== 'high' && zoom >= 17 && !riskHighOnly);
      if (show) item.poly.addTo(m.layer);
    });
    if (!map.hasLayer(m.layer)) map.addLayer(m.layer);
  });
  // 混在グリッドはズームに関わらず常時表示を維持
  var mixedCb = document.getElementById('chk-mixed');
  if (mixedCb && mixedCb.checked && !map.hasLayer(mixedGridLayer)) {
    map.addLayer(mixedGridLayer);
  }
}



// ── 混在リスクグリッド ──────────────────────────────────────
var GRID_LAT = 100 / 111000;
var GRID_LNG = 100 / (111000 * Math.cos(26.15 * Math.PI / 180));
var GRID_ORIGIN_LAT = 26.05;
var GRID_ORIGIN_LNG = 127.62;
var mixedGridLayer = L.layerGroup().addTo(map);

function _updateMixedGrid() {
  var cells = {};
  Object.keys(MUNIS).forEach(function(key) {
    var m = MUNIS[key];
    if (!m.loaded) return;
    m.polygons.forEach(function(item) {
      var r = Math.floor((item.lat - GRID_ORIGIN_LAT) / GRID_LAT);
      var c = Math.floor((item.lng - GRID_ORIGIN_LNG) / GRID_LNG);
      var k = r + '_' + c;
      if (!cells[k]) cells[k] = {hasHigh: false, hasLow: false, r: r, c: c};
      if (item.cat === 'high') cells[k].hasHigh = true;
      if (item.cat === 'low')  cells[k].hasLow  = true;
    });
  });
  mixedGridLayer.clearLayers();
  var mixCount = 0;
  Object.keys(cells).forEach(function(k) {
    var cell = cells[k];
    if (!cell.hasHigh || !cell.hasLow) return;
    var lat1 = GRID_ORIGIN_LAT + cell.r * GRID_LAT;
    var lng1 = GRID_ORIGIN_LNG + cell.c * GRID_LNG;
    L.rectangle([[lat1, lng1], [lat1 + GRID_LAT, lng1 + GRID_LNG]], {
      color: '#9B30FF', weight: 1, fillColor: '#9B30FF', fillOpacity: 0.35
    }).bindTooltip('混在エリア（広＋小）', {sticky: true})
      .addTo(mixedGridLayer);
    mixCount++;
  });
  var statusEl = document.getElementById('status-mixed');
  if (statusEl) {
    statusEl.style.color = mixCount > 0 ? '#6600cc' : '#888';
    statusEl.textContent = mixCount > 0 ? mixCount + 'グリッド検出' : '検出なし';
  }
  console.log('混在グリッド: ' + mixCount + 'セル');
}

// ── ズームインジケーター ──────────────────────────────────────
function _updateZoomIndicator() {
  var el = document.getElementById('zoom-value');
  if (el) el.textContent = map.getZoom();
}
window.addEventListener('load', _updateZoomIndicator);

// ── 操作関数 ────────────────────────────────────────────────
function toggleLayer(layer, show) {
  if (show) map.addLayer(layer);
  else map.removeLayer(layer);
}


function switchBasemap(val) {
  if (val === 'aerial') {
    map.removeLayer(streetLayer);
    map.addLayer(aerialLayer);
  } else {
    map.removeLayer(aerialLayer);
    map.addLayer(streetLayer);
  }
}


// ── エリア境界線 ──────────────────────────────────────────────
var MUNI_COLORS = {
  nw: '#3498DB', ne: '#E67E22', cw: '#27AE60',
  ce: '#E74C3C', sw: '#8E44AD', se: '#16A085'
};
var areaGridLayer = L.layerGroup().addTo(map);

(function() {
  Object.keys(MUNIS).forEach(function(key) {
    var m = MUNIS[key];
    var color = MUNI_COLORS[key];
    var p = m.bbox.split(',').map(Number); // [minLat, minLng, maxLat, maxLng]
    var cLat = (p[0] + p[2]) / 2;
    var cLng = (p[1] + p[3]) / 2;

    L.rectangle([[p[0], p[1]], [p[2], p[3]]], {
      color: color, weight: 2,
      fillColor: color, fillOpacity: 0.07,
      dashArray: '8,5'
    }).addTo(areaGridLayer);

    L.marker([cLat, cLng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="color:' + color + ';font-weight:bold;font-size:12px;' +
              'font-family:sans-serif;background:rgba(255,255,255,0.85);' +
              'padding:2px 8px;border-radius:4px;border:1.5px solid ' + color + ';' +
              'white-space:nowrap;transform:translate(-50%,-50%);pointer-events:none">' +
              m.label + '</div>',
        iconSize: [0, 0], iconAnchor: [0, 0]
      }),
      interactive: false
    }).addTo(areaGridLayer);
  });
})();


// ===== 空き家マップ Supabase連携 =====
var SB_URL = 'https://okijwcasxxwqmhofndeg.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9raWp3Y2FzeHh3cW1ob2ZuZGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTg5MjgsImV4cCI6MjA5NDc5NDkyOH0.rdp7YZw-Qm6BMzbJTn8BznvgP5vcq7jq0IPVg0F_QHw';
var akiyaLayer = L.layerGroup().addTo(map);

async function loadAkiyaPins() {
  try {
    var res = await fetch(
      SB_URL + '/rest/v1/akiya_records?order=created_at.desc&limit=500&select=id,address,score,gps,judge,cond',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    var data = await res.json();
    if (!Array.isArray(data)) return;
    akiyaLayer.clearLayers();
    data.forEach(function(r) {
      if (!r.gps || !r.gps.lat || !r.gps.lng) return;
      var score = r.score || 0;
      var color = score >= 15 ? '#E24B4A' : score >= 7 ? '#EF9F27' : '#1D9E75';
      var icon = L.divIcon({
        className: '',
        html: '<div style="width:30px;height:30px;background:' + color + ';border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;line-height:1;">' + score + '</div>',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
      });
      var marker = L.marker([r.gps.lat, r.gps.lng], { icon: icon });
      marker.bindPopup(
        '<div style="font-size:12px;min-width:170px;font-family:sans-serif">' +
        '<div style="font-weight:700;margin-bottom:5px;line-height:1.4">' + (r.address || '住所不明') + '</div>' +
        '<div style="margin-bottom:2px">スコア: <strong style="color:' + color + ';font-size:14px">' + score + '</strong></div>' +
        '<div style="margin-bottom:2px">判定: ' + (r.judge || '-') + '</div>' +
        '<div>状態: ' + (r.cond || '-') + '</div>' +
        '</div>'
      );
      akiyaLayer.addLayer(marker);
    });
    console.log('空き家マップ: ' + data.length + '件読み込み完了');
  } catch(e) {
    console.error('Supabaseピン読み込みエラー:', e);
  }
}

loadAkiyaPins();
</script>
</body>
</html>
