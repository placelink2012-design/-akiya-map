<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空き家リスクマップ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.vectorgrid@latest/dist/Leaflet.VectorGrid.bundled.js"></script>
  <script src="https://unpkg.com/pbf@3.3.2/dist/pbf.js"></script>
  <script src="https://unpkg.com/@mapbox/vector-tile@1.3.1/dist/vector-tile.js"></script>
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
    #map { position:fixed; top:0; bottom:0; left:0; right:0; }
    .panel {
      position:fixed; z-index:1000;
      background:rgba(255,255,255,0.97);
      border-radius:8px; border:1px solid #bbb;
      box-shadow:2px 2px 8px rgba(0,0,0,0.2);
      font-family:sans-serif; font-size:12px;
    }
    .ph { font-weight:bold; font-size:13px; border-bottom:2px solid #555;
          padding-bottom:4px; margin-bottom:8px; }
    .sl { font-size:11px; font-weight:bold; color:#444; margin-bottom:4px; }
    label.cl { display:block; margin-bottom:2px; cursor:pointer; }
  </style>
</head>
<body>
<div id="map"></div>

<!-- タイトル -->
<div style="position:fixed;top:10px;left:50%;transform:translateX(-50%);
            z-index:1100;background:rgba(255,255,255,0.93);padding:8px 20px;
            border-radius:6px;border:1px solid #aaa;font-size:15px;font-weight:bold;
            pointer-events:none;white-space:nowrap;font-family:sans-serif">
  空き家リスクマップ
</div>

<!-- ズームインジケーター -->
<div style="position:fixed;bottom:20px;right:10px;z-index:1100;
     background:rgba(255,255,255,0.93);padding:6px 12px;border-radius:6px;
     border:1px solid #aaa;font-family:sans-serif;font-size:12px;
     pointer-events:none">
  ズーム: <span id="zoom-value" style="font-weight:bold">14</span>
</div>

<!-- 右上コントロールパネル -->
<div class="panel" style="top:10px;right:10px;padding:10px 12px;width:200px;max-height:90vh;overflow-y:auto">
  <div class="ph">レイヤー制御</div>

  <div class="sl">ベースマップ</div>
  <label class="cl">
    <input type="radio" name="basemap" value="aerial" checked
           onchange="switchBasemap(this.value)"> 航空写真
  </label>
  <label class="cl" style="margin-bottom:8px">
    <input type="radio" name="basemap" value="street"
           onchange="switchBasemap(this.value)"> 標準地図
  </label>

  <div class="sl">建物ポリゴン（国土地理院）</div>
  <label class="cl">
    <input type="checkbox" id="chk-gsi-bldg" checked
           onchange="_applyVisibility()"> 地理院建物ポリゴン
  </label>
  <div id="status-gsi" style="font-size:10px;color:#888;margin:0 0 4px 18px"></div>
  <label class="cl" style="margin-bottom:8px">
    <input type="checkbox" id="chk-risk-high" onchange="_applyVisibility()"> リスク高のみ表示
  </label>

  <div class="sl">その他</div>
  <label class="cl">
    <input type="checkbox" id="chk-mixed" checked
           onchange="_applyVisibility()"> 混在リスクグリッド
  </label>
  <div id="status-mixed" style="font-size:10px;color:#888;margin:0 0 4px 18px"></div>
  <label class="cl" style="margin-bottom:8px">
    <input type="checkbox" id="chk-akiya" checked
           onchange="toggleLayer(akiyaLayer, this.checked)"> 空き家マップ ピン
  </label>
</div>

<!-- 凡例 -->
<div class="panel" style="bottom:20px;left:10px;padding:10px 14px;line-height:2.0">
  <b style="font-size:12px">建物敷地面積</b><br>
  <span style="display:inline-block;width:14px;height:14px;background:#E24B4A;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 広（100㎡以上）リスク高<br>
  <span style="display:inline-block;width:14px;height:14px;background:#EF9F27;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 中（60〜100㎡）リスク中<br>
  <span style="display:inline-block;width:14px;height:14px;background:#1D9E75;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 小（60㎡未満）リスク低<br>
  <span style="display:inline-block;width:14px;height:14px;background:#4A90D9;vertical-align:middle;border-radius:2px;margin-right:4px;opacity:0.8"></span>建物（広域表示 ズーム15以下）<br>
  <span style="display:inline-block;width:14px;height:14px;background:rgba(155,48,255,0.45);vertical-align:middle;border-radius:2px;margin-right:4px;border:1px solid #9B30FF"></span>混在（広＋小 100mグリッド）<br>
  <hr style="margin:4px 0">
  <small style="color:#666">建物ポリゴン: 国土地理院 基盤地図情報</small>
</div>

<script>
// ── マップ初期化 ─────────────────────────────────────────────
var map = L.map('map', {center: [26.155, 127.675], zoom: 14});
window.addEventListener('load', function() {
  map.invalidateSize();
  _updateZoomIndicator();
  _applyVisibility();
});
map.on('zoom', _updateZoomIndicator);
map.on('zoomend', function() { _updateZoomIndicator(); _applyVisibility(); });
map.on('moveend', _applyVisibility);

// ── ベースマップ ─────────────────────────────────────────────
var aerialLayer = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {attribution: 'Esri World Imagery', maxZoom: 20}
).addTo(map);

var streetLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution: 'CartoDB', subdomains: 'abcd', maxZoom: 20}
);

// ── ズームインジケーター ──────────────────────────────────────
function _updateZoomIndicator() {
  var el = document.getElementById('zoom-value');
  if (el) el.textContent = map.getZoom().toFixed(1);
}

// ── 共通操作 ────────────────────────────────────────────────
function toggleLayer(layer, show) {
  if (show) map.addLayer(layer);
  else map.removeLayer(layer);
}

function switchBasemap(val) {
  if (val === 'aerial') {
    map.removeLayer(streetLayer);
    map.addLayer(aerialLayer);
  } else {
    map.removeLayer(aerialLayer);
    map.addLayer(streetLayer);
  }
}

// ── 地理院建物ポリゴン ─────────────────────────────────────
var GSI_TILE_URL = 'https://cyberjapandata.gsi.go.jp/xyz/optimal_bvmap-v1/{z}/{x}/{y}.pbf';
var GSI_DETAIL_ZOOM = 16; // 詳細表示のズームレベル（面積計算・色分け）

var _gsiOverviewVG = null;           // VectorGrid: ズーム<16の広域表示
var _gsiDetailLayer = L.layerGroup(); // 手動描画: ズーム>=16の色分け表示
var _gsiPolygons = [];               // 全ポリゴン {poly, cat, lat, lng}
var _tileCache = {};                 // 読み込み済みタイル {key: 'loaded'|'error'}
var _loadingCount = 0;
var _canvasRenderer = L.canvas({padding: 0.5}); // 高速レンダリング用

// VectorGrid（広域表示）初期化
function _initGsiOverview() {
  if (_gsiOverviewVG) return;
  var bldStyle  = {fill:true, fillColor:'#4A90D9', fillOpacity:0.6, color:'#fff', weight:0.5, opacity:1};
  var sbldStyle = {fill:true, fillColor:'#4A90D9', fillOpacity:0.5, color:'#fff', weight:0.5, opacity:1};
  var hidden    = {fill:false, stroke:false, weight:0, fillOpacity:0, opacity:0};
  var visibleMap = {BldA: bldStyle, SBldA: sbldStyle};
  var styles = new Proxy(visibleMap, {
    get: function(obj, name) {
      if (typeof name !== 'string') return obj[name];
      return Object.prototype.hasOwnProperty.call(obj, name) ? obj[name] : hidden;
    }
  });
  _gsiOverviewVG = L.vectorGrid.protobuf(GSI_TILE_URL, {
    minZoom: 4, maxZoom: 16,
    vectorTileLayerStyles: styles,
    interactive: false,
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>'
  });
}

// タイルピクセル座標 → LatLng
function _tilePixToLatLng(tx, ty, tz, px, py, extent) {
  var n = Math.pow(2, tz);
  var lng = (tx + px / extent) / n * 360 - 180;
  var yM  = (ty + py / extent) / n;
  var lat = Math.atan(Math.sinh(Math.PI * (1 - 2 * yM))) * 180 / Math.PI;
  return [lat, lng];
}

// 外周リングの面積計算（ shoelace、沖縄固定スケール）
function _calcRingArea(ring, tx, ty, tz, extent) {
  var LAT_M = 111000;
  var LNG_M = 111000 * Math.cos(26.15 * Math.PI / 180);
  var pts = ring.map(function(p) { return _tilePixToLatLng(tx, ty, tz, p.x, p.y, extent); });
  var area = 0;
  for (var i = 0, n = pts.length; i < n; i++) {
    var j = (i + 1) % n;
    area += (pts[i][1] * LNG_M) * (pts[j][0] * LAT_M)
          - (pts[j][1] * LNG_M) * (pts[i][0] * LAT_M);
  }
  return Math.abs(area) / 2;
}

// 現在の表示範囲の GSI タイル座標一覧
function _getVisibleTiles(tz) {
  var b = map.getBounds();
  var n = Math.pow(2, tz);
  function lng2x(v) { return Math.floor((v + 180) / 360 * n); }
  function lat2y(v) {
    var r = v * Math.PI / 180;
    return Math.floor((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * n);
  }
  var x0 = lng2x(b.getWest()),  x1 = lng2x(b.getEast());
  var y0 = lat2y(b.getNorth()), y1 = lat2y(b.getSouth());
  var tiles = [];
  for (var x = x0; x <= x1; x++)
    for (var y = y0; y <= y1; y++)
      tiles.push({z: tz, x: x, y: y});
  return tiles;
}

// 表示範囲の未取得タイルを非同期ロード
function _loadGsiDetailTiles() {
  _getVisibleTiles(GSI_DETAIL_ZOOM).forEach(function(t) {
    var key = t.z + '/' + t.x + '/' + t.y;
    if (_tileCache[key]) return;
    _tileCache[key] = 'loading';
    _loadingCount++;
    _updateGsiStatus();
    var url = GSI_TILE_URL.replace('{z}', t.z).replace('{x}', t.x).replace('{y}', t.y);
    fetch(url)
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.arrayBuffer(); })
      .then(function(buf) { _tileCache[key] = 'loaded'; _parsePbfTile(buf, t.z, t.x, t.y); })
      .catch(function(e) { _tileCache[key] = 'error'; console.warn('GSI tile ' + key, e.message); })
      .finally(function() { _loadingCount = Math.max(0, _loadingCount - 1); _updateGsiStatus(); });
  });
}

// PBF タイルを解析して色分けポリゴンを生成
function _parsePbfTile(buf, tz, tx, ty) {
  var pbf, vt;
  try {
    pbf = new Pbf(new Uint8Array(buf));
    vt  = new vectorTile.VectorTile(pbf);
  } catch(e) { console.error('PBF parse:', e); return; }

  var zoom        = Math.round(map.getZoom());
  var gsiOn       = document.getElementById('chk-gsi-bldg').checked;
  var riskHighOnly= document.getElementById('chk-risk-high').checked;
  var showing     = gsiOn && zoom >= GSI_DETAIL_ZOOM && map.hasLayer(_gsiDetailLayer);
  var added       = 0;

  ['BldA', 'SBldA'].forEach(function(name) {
    var layer = vt.layers[name];
    if (!layer) return;
    var extent = layer.extent || 4096;
    for (var i = 0; i < layer.length; i++) {
      var feat = layer.feature(i);
      if (feat.type !== 3) continue;
      var geom = feat.loadGeometry();
      if (!geom || !geom[0] || geom[0].length < 3) continue;
      var outer = geom[0];
      var area = _calcRingArea(outer, tx, ty, tz, extent);
      if (area <= 0 || area > 100000) continue;

      var cat, color, label;
      if (area >= 100)      { cat='high'; color='#E24B4A'; label='広（100㎡以上）'; }
      else if (area >= 60)  { cat='mid';  color='#EF9F27'; label='中（60〜100㎡）'; }
      else                  { cat='low';  color='#1D9E75'; label='小（60㎡未満）';  }

      var coords = outer.map(function(p) { return _tilePixToLatLng(tx, ty, tz, p.x, p.y, extent); });
      var cLat = 0, cLng = 0;
      coords.forEach(function(c) { cLat += c[0]; cLng += c[1]; });
      cLat /= coords.length; cLng /= coords.length;

      var poly = L.polygon(coords, {
        color: '#fff', weight: 0.5, fillColor: color, fillOpacity: 0.65,
        renderer: _canvasRenderer
      }).bindTooltip(Math.round(area) + '㎡ — ' + label, {sticky: true});

      _gsiPolygons.push({poly: poly, cat: cat, lat: cLat, lng: cLng});

      if (showing && (cat === 'high' || !riskHighOnly)) poly.addTo(_gsiDetailLayer);
      added++;
    }
  });

  if (added > 0) {
    _updateGsiStatus();
    _updateMixedGrid();
  }
}

function _updateGsiStatus() {
  var el = document.getElementById('status-gsi');
  if (!el) return;
  if (_loadingCount > 0) {
    el.style.color = '#888';
    el.textContent = '読み込み中(' + _loadingCount + ')...';
  } else {
    el.style.color = '#1a7a4a';
    el.textContent = _gsiPolygons.length.toLocaleString() + '棟読み込み済';
  }
}

// レイヤー表示制御（ズーム・チェックボックス反映）
function _applyVisibility() {
  var zoom        = Math.round(map.getZoom());
  var gsiOn       = document.getElementById('chk-gsi-bldg').checked;
  var riskHighOnly= document.getElementById('chk-risk-high').checked;

  if (!gsiOn) {
    if (_gsiOverviewVG && map.hasLayer(_gsiOverviewVG)) map.removeLayer(_gsiOverviewVG);
    if (map.hasLayer(_gsiDetailLayer)) map.removeLayer(_gsiDetailLayer);
  } else if (zoom >= GSI_DETAIL_ZOOM) {
    // 色分けモード
    if (_gsiOverviewVG && map.hasLayer(_gsiOverviewVG)) map.removeLayer(_gsiOverviewVG);
    _gsiDetailLayer.clearLayers();
    _gsiPolygons.forEach(function(item) {
      if (item.cat === 'high' || !riskHighOnly) item.poly.addTo(_gsiDetailLayer);
    });
    if (!map.hasLayer(_gsiDetailLayer)) map.addLayer(_gsiDetailLayer);
    _loadGsiDetailTiles();
  } else {
    // 広域表示モード（VectorGrid）
    if (map.hasLayer(_gsiDetailLayer)) map.removeLayer(_gsiDetailLayer);
    _initGsiOverview();
    if (!map.hasLayer(_gsiOverviewVG)) map.addLayer(_gsiOverviewVG);
  }

  // 混在リスクグリッド
  var mixedCb = document.getElementById('chk-mixed');
  if (mixedCb) {
    if (mixedCb.checked) { if (!map.hasLayer(mixedGridLayer)) map.addLayer(mixedGridLayer); }
    else                 { if ( map.hasLayer(mixedGridLayer)) map.removeLayer(mixedGridLayer); }
  }
}

// ── 混在リスクグリッド ──────────────────────────────────────
var GRID_LAT = 100 / 111000;
var GRID_LNG = 100 / (111000 * Math.cos(26.15 * Math.PI / 180));
var GRID_ORIGIN_LAT = 26.05;
var GRID_ORIGIN_LNG = 127.59;
var mixedGridLayer = L.layerGroup().addTo(map);

function _updateMixedGrid() {
  var cells = {};
  _gsiPolygons.forEach(function(item) {
    var r = Math.floor((item.lat - GRID_ORIGIN_LAT) / GRID_LAT);
    var c = Math.floor((item.lng - GRID_ORIGIN_LNG) / GRID_LNG);
    var k = r + '_' + c;
    if (!cells[k]) cells[k] = {hasHigh:false, hasLow:false, r:r, c:c};
    if (item.cat === 'high') cells[k].hasHigh = true;
    if (item.cat === 'low')  cells[k].hasLow  = true;
  });
  mixedGridLayer.clearLayers();
  var mixCount = 0;
  Object.keys(cells).forEach(function(k) {
    var cell = cells[k];
    if (!cell.hasHigh || !cell.hasLow) return;
    var lat1 = GRID_ORIGIN_LAT + cell.r * GRID_LAT;
    var lng1 = GRID_ORIGIN_LNG + cell.c * GRID_LNG;
    L.rectangle([[lat1, lng1], [lat1 + GRID_LAT, lng1 + GRID_LNG]], {
      color: '#9B30FF', weight: 1, fillColor: '#9B30FF', fillOpacity: 0.35
    }).bindTooltip('混在エリア（広＋小）', {sticky: true}).addTo(mixedGridLayer);
    mixCount++;
  });
  var statusEl = document.getElementById('status-mixed');
  if (statusEl) {
    statusEl.style.color = mixCount > 0 ? '#6600cc' : '#888';
    statusEl.textContent = mixCount > 0 ? mixCount + 'グリッド検出' : '検出なし';
  }
}

// ── 起動時初期化 ─────────────────────────────────────────────
_initGsiOverview();  // VectorGrid オブジェクト生成（まだ地図には追加しない）

// ===== 空き家マップ Supabase連携 =====
var SB_URL = 'https://okijwcasxxwqmhofndeg.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9raWp3Y2FzeHh3cW1ob2ZuZGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTg5MjgsImV4cCI6MjA5NDc5NDkyOH0.rdp7YZw-Qm6BMzbJTn8BznvgP5vcq7jq0IPVg0F_QHw';
var akiyaLayer = L.layerGroup().addTo(map);

async function loadAkiyaPins() {
  try {
    var res = await fetch(
      SB_URL + '/rest/v1/akiya_records?order=created_at.desc&limit=500&select=id,address,score,gps,judge,cond',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    var data = await res.json();
    if (!Array.isArray(data)) return;
    akiyaLayer.clearLayers();
    data.forEach(function(r) {
      if (!r.gps || !r.gps.lat || !r.gps.lng) return;
      var score = r.score || 0;
      var color = score >= 15 ? '#E24B4A' : score >= 7 ? '#EF9F27' : '#1D9E75';
      var icon = L.divIcon({
        className: '',
        html: '<div style="width:30px;height:30px;background:' + color + ';border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;line-height:1;">' + score + '</div>',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
      });
      var marker = L.marker([r.gps.lat, r.gps.lng], {icon: icon});
      marker.bindPopup(
        '<div style="font-size:12px;min-width:170px;font-family:sans-serif">' +
        '<div style="font-weight:700;margin-bottom:5px;line-height:1.4">' + (r.address || '住所不明') + '</div>' +
        '<div style="margin-bottom:2px">スコア: <strong style="color:' + color + ';font-size:14px">' + score + '</strong></div>' +
        '<div style="margin-bottom:2px">判定: ' + (r.judge || '-') + '</div>' +
        '<div>状態: ' + (r.cond || '-') + '</div>' +
        '</div>'
      );
      akiyaLayer.addLayer(marker);
    });
  } catch(e) {
    console.error('Supabaseピン読み込みエラー:', e);
  }
}
loadAkiyaPins();
</script>
</body>
</html>
