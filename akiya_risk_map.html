<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空き家リスクマップ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.vectorgrid@latest/dist/Leaflet.VectorGrid.bundled.js"></script>
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
    #map { position:fixed; top:0; bottom:0; left:0; right:0; }
    .panel {
      position:fixed; z-index:1000;
      background:rgba(255,255,255,0.97);
      border-radius:8px; border:1px solid #bbb;
      box-shadow:2px 2px 8px rgba(0,0,0,0.2);
      font-family:sans-serif; font-size:12px;
    }
    .ph { font-weight:bold; font-size:13px; border-bottom:2px solid #555;
          padding-bottom:4px; margin-bottom:8px; }
    .sl { font-size:11px; font-weight:bold; color:#444; margin-bottom:4px; }
    label.cl { display:block; margin-bottom:2px; cursor:pointer; }
  </style>
</head>
<body>
<div id="map"></div>

<!-- タイトル -->
<div style="position:fixed;top:10px;left:50%;transform:translateX(-50%);
            z-index:1100;background:rgba(255,255,255,0.93);padding:8px 20px;
            border-radius:6px;border:1px solid #aaa;font-size:15px;font-weight:bold;
            pointer-events:none;white-space:nowrap;font-family:sans-serif">
  空き家リスクマップ
</div>

<!-- ズームインジケーター -->
<div style="position:fixed;bottom:20px;right:10px;z-index:1100;
     background:rgba(255,255,255,0.93);padding:6px 12px;border-radius:6px;
     border:1px solid #aaa;font-family:sans-serif;font-size:12px;pointer-events:none">
  ズーム: <span id="zoom-value" style="font-weight:bold">14</span>
</div>

<!-- コントロールパネル -->
<div class="panel" style="top:10px;right:10px;padding:10px 12px;width:200px;max-height:90vh;overflow-y:auto">
  <div class="ph">レイヤー制御</div>

  <div class="sl">ベースマップ</div>
  <label class="cl">
    <input type="radio" name="basemap" value="aerial" checked
           onchange="switchBasemap(this.value)"> 航空写真
  </label>
  <label class="cl" style="margin-bottom:8px">
    <input type="radio" name="basemap" value="street"
           onchange="switchBasemap(this.value)"> 標準地図
  </label>

  <div class="sl">建物ポリゴン（国土地理院）</div>
  <label class="cl">
    <input type="checkbox" id="chk-gsi-bldg" checked
           onchange="_applyVisibility()"> 地理院建物ポリゴン
  </label>
  <div id="status-gsi" style="font-size:10px;color:#888;margin:0 0 4px 18px"></div>
  <label class="cl" style="margin-bottom:8px">
    <input type="checkbox" id="chk-risk-high" onchange="_onFilterChange()"> リスク高のみ表示
  </label>

  <div class="sl">その他</div>
  <label class="cl">
    <input type="checkbox" id="chk-mixed" checked
           onchange="_applyVisibility()"> 混在リスクグリッド
  </label>
  <div id="status-mixed" style="font-size:10px;color:#888;margin:0 0 4px 18px"></div>
  <label class="cl" style="margin-bottom:8px">
    <input type="checkbox" id="chk-akiya" checked
           onchange="toggleLayer(akiyaLayer, this.checked)"> 空き家マップ ピン
  </label>
</div>

<!-- 凡例 -->
<div class="panel" style="bottom:20px;left:10px;padding:10px 14px;line-height:2.0">
  <b style="font-size:12px">建物敷地面積</b><br>
  <span style="display:inline-block;width:14px;height:14px;background:#E24B4A;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 広（100㎡以上）リスク高<br>
  <span style="display:inline-block;width:14px;height:14px;background:#EF9F27;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 中（60〜100㎡）リスク中<br>
  <span style="display:inline-block;width:14px;height:14px;background:#1D9E75;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 小（60㎡未満）リスク低<br>
  <span style="display:inline-block;width:14px;height:14px;background:#4A90D9;vertical-align:middle;border-radius:2px;margin-right:4px;opacity:0.8"></span>建物（広域 ズーム15以下）<br>
  <span style="display:inline-block;width:14px;height:14px;background:rgba(155,48,255,0.45);vertical-align:middle;border-radius:2px;margin-right:4px;border:1px solid #9B30FF"></span>混在（広＋小 5棟以上グリッド）<br>
  <hr style="margin:4px 0">
  <small style="color:#666">建物: 国土地理院 基盤地図情報</small>
</div>

<script>
// ── マップ初期化 ────────────────────────────────────────────
var map = L.map('map', {center: [26.155, 127.675], zoom: 14, maxZoom: 20});
console.log('[GSI] ▶ akiya_risk_map 初期化開始');
window.addEventListener('load', function() {
  map.invalidateSize();
  _updateZoomIndicator();
  _applyVisibility();
});
map.on('zoom',    _updateZoomIndicator);
map.on('zoomend', function() { _updateZoomIndicator(); _clearDetailCache(); _applyVisibility(); });
map.on('moveend', _applyVisibility);

// ── ベースマップ ────────────────────────────────────────────
var aerialLayer = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {attribution:'Esri World Imagery', maxZoom:20}
).addTo(map);

var streetLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'CartoDB', subdomains:'abcd', maxZoom:20}
);

function _updateZoomIndicator() {
  var el = document.getElementById('zoom-value');
  if (el) el.textContent = map.getZoom().toFixed(1);
}
function toggleLayer(layer, show) { show ? map.addLayer(layer) : map.removeLayer(layer); }
function switchBasemap(val) {
  if (val === 'aerial') { map.removeLayer(streetLayer); map.addLayer(aerialLayer); }
  else { map.removeLayer(aerialLayer); map.addLayer(streetLayer); }
}

// ── 地理院建物ポリゴン ─────────────────────────────────────
var GSI_URL          = 'https://cyberjapandata.gsi.go.jp/xyz/optimal_bvmap-v1/{z}/{x}/{y}.pbf';
var GSI_DETAIL_ZOOM  = 16;  // このズーム以上で面積色分けポリゴンに切替
var GSI_TILE_ZOOM    = 17;  // PBFタイル取得ズーム（固定）
var MIXED_MIN_COUNT  = 5;   // 混在グリッドの最低建物棟数
console.log('[GSI] 設定: URL='+GSI_URL);
console.log('[GSI] 設定: DETAIL_ZOOM='+GSI_DETAIL_ZOOM+' (ズーム'+GSI_DETAIL_ZOOM+'以上で建物ポリゴン表示)');

// 広域表示用 VectorGrid（ズーム <16、青単色）
var _gsiOverviewVG = null;

// 詳細表示用（ズーム >=16、面積色分け）
var _gsiDetailLayer = L.layerGroup();
var _gsiPolygons    = [];   // {poly, cat, lat, lng}
var _tileDone       = {};   // 取得済みタイルキー
var _loadingN       = 0;
var _canvasR        = L.canvas({padding: 0.5});

function _initOverviewVG() {
  if (_gsiOverviewVG) return;
  console.log('[GSI] VectorGrid 広域表示を初期化 (ズーム<'+GSI_DETAIL_ZOOM+' 用)');
  var bld = {fill:true, fillColor:'#4A90D9', fillOpacity:0.6, color:'#fff', weight:0.5, opacity:1};
  var hid = {fill:false, stroke:false, weight:0, fillOpacity:0, opacity:0};
  var map_ = {BldA: bld, SBldA: bld};
  var styles = new Proxy(map_, {
    get: function(o, n) {
      if (typeof n !== 'string') return o[n];
      return Object.prototype.hasOwnProperty.call(o, n) ? o[n] : hid;
    }
  });
  _gsiOverviewVG = L.vectorGrid.protobuf(GSI_URL, {
    minZoom:1, maxNativeZoom:GSI_DETAIL_ZOOM, maxZoom:22,
    vectorTileLayerStyles: styles,
    interactive: false,
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>'
  });

  // "Cannot read properties of null (reading 'data')" 対策:
  // タイル取得Promiseに .catch を追加してnullレイヤーアクセスを防ぐ
  if (typeof _gsiOverviewVG._getVectorTilePromise === 'function') {
    var _origGVTP = _gsiOverviewVG._getVectorTilePromise.bind(_gsiOverviewVG);
    _gsiOverviewVG._getVectorTilePromise = function(coords) {
      return _origGVTP(coords).then(function(vt) {
        if (!vt) return {layers: {}};
        if (vt.layers && !Array.isArray(vt.layers)) {
          for (var k in vt.layers) { if (!vt.layers[k]) delete vt.layers[k]; }
        }
        return vt;
      }).catch(function(e) {
        console.warn('[GSI] VectorGrid tile suppressed:', e.message);
        return {layers: {}};
      });
    };
  }
}

// ── インライン PBF デコーダー（外部ライブラリ不要） ────────────
function _PBFReader(u8) { this.buf = u8; this.pos = 0; this.len = u8.length; }
_PBFReader.prototype = {
  readVarint: function() {
    var b, val = 0, shift = 0;
    do { b = this.buf[this.pos++]; val |= (b & 0x7f) << shift; shift += 7; } while (b & 0x80);
    return val >>> 0;
  },
  readString: function() {
    var n = this.readVarint(), end = this.pos + n, s = '';
    while (this.pos < end) {
      var c = this.buf[this.pos++];
      if (c < 0x80) { s += String.fromCharCode(c); }
      else if (c < 0xE0) { s += String.fromCharCode(((c & 0x1f) << 6) | (this.buf[this.pos++] & 0x3f)); }
      else { s += String.fromCharCode(((c & 0x0f) << 12) | ((this.buf[this.pos++] & 0x3f) << 6) | (this.buf[this.pos++] & 0x3f)); }
    }
    return s;
  },
  readPackedVarint: function() {
    var n = this.readVarint(), end = this.pos + n, arr = [];
    while (this.pos < end) arr.push(this.readVarint());
    return arr;
  },
  skip: function(type) {
    if      (type === 0) { while (this.buf[this.pos++] & 0x80); }
    else if (type === 2) { this.pos += this.readVarint(); }
    else if (type === 5) { this.pos += 4; }
    else if (type === 1) { this.pos += 8; }
  },
  readFields: function(fn, obj, end) {
    end = (end === undefined) ? this.len : end;
    while (this.pos < end) {
      var key = this.readVarint(), tag = key >> 3, type = key & 7, start = this.pos;
      fn(tag, obj, this);
      if (this.pos === start) this.skip(type);
    }
    return obj;
  },
  readMessage: function(fn, obj) {
    var n = this.readVarint();
    return this.readFields(fn, obj, this.pos + n);
  }
};

function _readLayerFields(tag, lyr, pbf) {
  if      (tag === 1) lyr.name   = pbf.readString();
  else if (tag === 2) lyr.feats.push(pbf.readMessage(_readFeatFields, {type:0, geom:[]}));
  else if (tag === 5) lyr.extent = pbf.readVarint();
}
function _readFeatFields(tag, f, pbf) {
  if      (tag === 3) f.type = pbf.readVarint();
  else if (tag === 4) f.geom = pbf.readPackedVarint();
}

// MVT コマンド列 → リング配列 [{x,y}]
function _decodeGeom(cmds) {
  var rings=[], ring=[], x=0, y=0, i=0;
  while (i < cmds.length) {
    var cl=cmds[i++], cmd=cl&7, cnt=cl>>3;
    if (cmd === 1) {
      if (ring.length) { rings.push(ring); ring=[]; }
      while (cnt--) {
        x += (cmds[i]>>1)^-(cmds[i++]&1);
        y += (cmds[i]>>1)^-(cmds[i++]&1);
        ring.push({x:x, y:y});
      }
    } else if (cmd === 2) {
      while (cnt--) {
        x += (cmds[i]>>1)^-(cmds[i++]&1);
        y += (cmds[i]>>1)^-(cmds[i++]&1);
        ring.push({x:x, y:y});
      }
    } else if (cmd === 7) {
      if (ring.length) { ring.push(ring[0]); rings.push(ring); ring=[]; }
    }
  }
  if (ring.length) rings.push(ring);
  return rings;
}

// タイルピクセル → LatLng
function _px2ll(tx, ty, tz, px, py, ext) {
  var n = Math.pow(2, tz);
  var lng = (tx + px/ext)/n*360 - 180;
  var lat = Math.atan(Math.sinh(Math.PI*(1 - 2*(ty+py/ext)/n)))*180/Math.PI;
  return [lat, lng];
}

// 外周リング面積（ショーレース、沖縄固定スケール）
function _ringArea(ring, tx, ty, tz, ext) {
  var LAT_M=111000, LNG_M=111000*Math.cos(26.15*Math.PI/180);
  var pts = ring.map(function(p){ return _px2ll(tx,ty,tz,p.x,p.y,ext); });
  var a=0, n=pts.length;
  for (var i=0; i<n; i++) {
    var j=(i+1)%n;
    a += (pts[i][1]*LNG_M)*(pts[j][0]*LAT_M) - (pts[j][1]*LNG_M)*(pts[i][0]*LAT_M);
  }
  return Math.abs(a)/2;
}

// 可視タイル座標一覧（タイルズーム tz）
function _visibleTiles(tz) {
  var b=map.getBounds(), n=Math.pow(2,tz);
  function lng2x(v){ return Math.floor((v+180)/360*n); }
  function lat2y(v){ var r=v*Math.PI/180; return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*n); }
  var x0=lng2x(b.getWest()), x1=lng2x(b.getEast());
  var y0=lat2y(b.getNorth()), y1=lat2y(b.getSouth());
  var tiles=[];
  for (var x=x0; x<=x1; x++) for (var y=y0; y<=y1; y++) tiles.push({z:tz,x:x,y:y});
  return tiles;
}

// 詳細キャッシュをクリア
function _clearDetailCache() {
  _tileDone = {};
  _gsiPolygons = [];
  _gsiDetailLayer.clearLayers();
  _loadingN = 0;
  _updateGsiStatus();
}

// 詳細タイルを非同期フェッチ＋パース（GSI_TILE_ZOOM=17固定）
function _loadDetailTiles() {
  var tiles = _visibleTiles(GSI_TILE_ZOOM);
  console.log('[GSI] _loadDetailTiles zoom='+map.getZoom().toFixed(1)+' tileZoom='+GSI_TILE_ZOOM+' tiles='+tiles.length);
  tiles.forEach(function(t) {
    var key = t.z+'/'+t.x+'/'+t.y;
    if (_tileDone[key]) { console.log('[GSI]   skip (cached)', key); return; }
    _tileDone[key] = true;
    _loadingN++;
    _setGsiStatus('読み込み中(' + _loadingN + ')...');

    var url = GSI_URL.replace('{z}',t.z).replace('{x}',t.x).replace('{y}',t.y);
    console.log('[GSI]   fetch', url);
    fetch(url)
      .then(function(r){
        console.log('[GSI]   response', key, r.status, r.headers.get('content-type'));
        if(!r.ok) throw new Error(r.status);
        return r.arrayBuffer();
      })
      .then(function(buf){
        if (!buf || buf.byteLength === 0) { console.warn('[GSI] empty buffer', key); return; }
        try { _parseTile(buf, t.z, t.x, t.y); }
        catch(e) { console.error('[GSI] _parseTile error', key, e.message, e.stack); }
      })
      .catch(function(e){ console.error('[GSI] tile error', key, e.message); })
      .finally(function(){ _loadingN=Math.max(0,_loadingN-1); _updateGsiStatus(); });
  });
}

// ArrayBuffer → BldA/SBldA ポリゴンを _gsiDetailLayer に追加
function _parseTile(buf, tz, tx, ty) {
  var KEY = tz+'/'+tx+'/'+ty;
  console.log('[GSI] parseTile', KEY, buf.byteLength+'B');

  var pbf = new _PBFReader(new Uint8Array(buf));
  var WANT = {BldA:1, SBldA:1};
  var riskHighOnly = document.getElementById('chk-risk-high').checked;
  var showing = document.getElementById('chk-gsi-bldg').checked &&
                Math.round(map.getZoom()) >= GSI_DETAIL_ZOOM &&
                map.hasLayer(_gsiDetailLayer);
  var added = 0;
  var layerNames = [];

  pbf.readFields(function(tag, _, pbf) {
    if (tag !== 3) return;
    var layer = pbf.readMessage(_readLayerFields, {name:'', extent:4096, feats:[]});
    layerNames.push(layer.name + '[' + layer.feats.length + ']');
    if (!WANT[layer.name]) return;

    var ext = layer.extent || 4096;
    var polyCount=0, skipType=0, skipGeom=0, skipArea=0;

    layer.feats.forEach(function(feat) {
      if (feat.type !== 3 || !feat.geom || feat.geom.length===0) { skipType++; return; }
      var rings = _decodeGeom(feat.geom);
      if (!rings || !rings[0] || rings[0].length < 3) { skipGeom++; return; }
      var area = _ringArea(rings[0], tx, ty, tz, ext);
      if (area <= 0 || area > 100000) { skipArea++; return; }

      var cat, color, label;
      if (area >= 100)     { cat='high'; color='#E24B4A'; label='広（100㎡以上）'; }
      else if (area >= 60) { cat='mid';  color='#EF9F27'; label='中（60〜100㎡）'; }
      else                 { cat='low';  color='#1D9E75'; label='小（60㎡未満）';  }

      var coords = rings[0].map(function(p){ return _px2ll(tx,ty,tz,p.x,p.y,ext); });
      var cLat=0, cLng=0;
      coords.forEach(function(c){ cLat+=c[0]; cLng+=c[1]; });
      cLat/=coords.length; cLng/=coords.length;

      var poly = L.polygon(coords, {
        color:'#fff', weight:0.5, fillColor:color, fillOpacity:0.65,
        renderer: _canvasR
      }).bindTooltip(Math.round(area)+'㎡ — '+label, {sticky:true});

      _gsiPolygons.push({poly:poly, cat:cat, lat:cLat, lng:cLng});
      if (showing && (cat==='high' || !riskHighOnly)) poly.addTo(_gsiDetailLayer);
      added++;
      polyCount++;
    });

    console.log('[GSI]   layer', layer.name, 'feats='+layer.feats.length,
      'poly='+polyCount, 'skipType='+skipType, 'skipGeom='+skipGeom, 'skipArea='+skipArea);
  });

  console.log('[GSI] tile', KEY, 'layers=['+layerNames.join(',')+'] added='+added, 'total='+_gsiPolygons.length);

  // BldA / SBldA 検出結果を明示
  var foundBldA  = layerNames.some(function(n){ return /^BldA/.test(n); });
  var foundSBldA = layerNames.some(function(n){ return /^SBldA/.test(n); });
  if (foundBldA || foundSBldA) {
    console.log('[GSI] ✓ BldA:' + (foundBldA ? '検出' : '未検出') +
                ' / SBldA:' + (foundSBldA ? '検出' : '未検出') +
                ' — tile ' + KEY);
  } else {
    var rawNames = layerNames.map(function(n){ return n.replace(/\[\d+\]$/, ''); });
    console.log('[GSI] ⚠ BldA/SBldA が tile ' + KEY + ' に見つかりません。含まれるレイヤー: ' + JSON.stringify(rawNames));
  }

  if (added > 0) {
    _updateGsiStatus();
    _updateMixedGrid();
  }
}

function _setGsiStatus(text, color) {
  var el = document.getElementById('status-gsi');
  if (!el) return;
  el.style.color = color || '#888';
  el.textContent = text;
}
function _updateGsiStatus() {
  if (_loadingN > 0) _setGsiStatus('読み込み中('+_loadingN+')...', '#888');
  else               _setGsiStatus(_gsiPolygons.length.toLocaleString()+'棟分析済', '#1a7a4a');
}

// riskHighOnly チェック変更時
function _onFilterChange() {
  var zoom = Math.round(map.getZoom());
  if (zoom >= GSI_DETAIL_ZOOM && map.hasLayer(_gsiDetailLayer)) {
    _rebuildDetailLayer();
  }
}

function _rebuildDetailLayer() {
  var riskHighOnly = document.getElementById('chk-risk-high').checked;
  _gsiDetailLayer.clearLayers();
  _gsiPolygons.forEach(function(item) {
    if (item.cat==='high' || !riskHighOnly) item.poly.addTo(_gsiDetailLayer);
  });
}

// ズーム・チェックボックスに応じてレイヤー切替
function _applyVisibility() {
  var zoom   = Math.round(map.getZoom());
  var gsiOn  = document.getElementById('chk-gsi-bldg').checked;
  console.log('[GSI] _applyVisibility zoom='+zoom+' gsiOn='+gsiOn+' detailZoom='+GSI_DETAIL_ZOOM);

  _initOverviewVG();

  if (!gsiOn) {
    if (_gsiOverviewVG && map.hasLayer(_gsiOverviewVG)) map.removeLayer(_gsiOverviewVG);
    if (map.hasLayer(_gsiDetailLayer)) map.removeLayer(_gsiDetailLayer);
  } else if (zoom >= GSI_DETAIL_ZOOM) {
    // 詳細モード：面積色分けポリゴン
    if (_gsiOverviewVG && map.hasLayer(_gsiOverviewVG)) map.removeLayer(_gsiOverviewVG);
    _rebuildDetailLayer();
    if (!map.hasLayer(_gsiDetailLayer)) map.addLayer(_gsiDetailLayer);
    _loadDetailTiles();
  } else {
    // 広域モード：VectorGrid（青）
    if (map.hasLayer(_gsiDetailLayer)) map.removeLayer(_gsiDetailLayer);
    if (!map.hasLayer(_gsiOverviewVG)) map.addLayer(_gsiOverviewVG);
  }

  // 混在グリッド
  var mixedOn = document.getElementById('chk-mixed').checked;
  if (mixedOn) { if (!map.hasLayer(mixedGridLayer)) map.addLayer(mixedGridLayer); }
  else         { if ( map.hasLayer(mixedGridLayer)) map.removeLayer(mixedGridLayer); }
}

// ── 混在リスクグリッド（建物密度 5棟以上のみ表示） ──────────────
var GRID_LAT = 100/111000;
var GRID_LNG = 100/(111000*Math.cos(26.15*Math.PI/180));
var GRID_ORIGIN_LAT = 26.05;
var GRID_ORIGIN_LNG = 127.59;
var mixedGridLayer = L.layerGroup().addTo(map);

function _updateMixedGrid() {
  var cells = {};
  _gsiPolygons.forEach(function(item) {
    var r = Math.floor((item.lat - GRID_ORIGIN_LAT)/GRID_LAT);
    var c = Math.floor((item.lng - GRID_ORIGIN_LNG)/GRID_LNG);
    var k = r+'_'+c;
    if (!cells[k]) cells[k]={hasHigh:false, hasLow:false, count:0, r:r, c:c};
    cells[k].count++;
    if (item.cat==='high') cells[k].hasHigh=true;
    if (item.cat==='low')  cells[k].hasLow =true;
  });
  mixedGridLayer.clearLayers();
  var cnt=0;
  Object.keys(cells).forEach(function(k) {
    var cell=cells[k];
    // 広＋小の混在 かつ 5棟以上のグリッドのみ表示（農地・森林を除外）
    if (!cell.hasHigh || !cell.hasLow || cell.count < MIXED_MIN_COUNT) return;
    var lat1=GRID_ORIGIN_LAT+cell.r*GRID_LAT, lng1=GRID_ORIGIN_LNG+cell.c*GRID_LNG;
    L.rectangle([[lat1,lng1],[lat1+GRID_LAT,lng1+GRID_LNG]], {
      color:'#9B30FF', weight:1, fillColor:'#9B30FF', fillOpacity:0.35
    }).bindTooltip('混在エリア（広＋小 計'+cell.count+'棟）',{sticky:true}).addTo(mixedGridLayer);
    cnt++;
  });
  var el=document.getElementById('status-mixed');
  if (el) { el.style.color=cnt>0?'#6600cc':'#888'; el.textContent=cnt>0?cnt+'グリッド検出':'検出なし'; }
}

var akiyaLayer = L.layerGroup().addTo(map);

async function loadAkiyaPins() {
  try {
    var res = await fetch(
      SB_URL+'/rest/v1/akiya_records?order=created_at.desc&limit=500&select=id,address,score,gps,judge,cond',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}
    );
    var data = await res.json();
    if (!Array.isArray(data)) return;
    akiyaLayer.clearLayers();
    data.forEach(function(r) {
      if (!r.gps||!r.gps.lat||!r.gps.lng) return;
      var score=r.score||0;
      var color=score>=15?'#E24B4A':score>=7?'#EF9F27':'#1D9E75';
      var icon=L.divIcon({
        className:'',
        html:'<div style="width:30px;height:30px;background:'+color+';border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;line-height:1;">'+score+'</div>',
        iconSize:[30,30], iconAnchor:[15,15]
      });
      L.marker([r.gps.lat,r.gps.lng],{icon:icon}).bindPopup(
        '<div style="font-size:12px;min-width:170px;font-family:sans-serif">'+
        '<div style="font-weight:700;margin-bottom:5px;line-height:1.4">'+(r.address||'住所不明')+'</div>'+
        '<div style="margin-bottom:2px">スコア: <strong style="color:'+color+';font-size:14px">'+score+'</strong></div>'+
        '<div style="margin-bottom:2px">判定: '+(r.judge||'-')+'</div>'+
        '<div>状態: '+(r.cond||'-')+'</div></div>'
      ).addTo(akiyaLayer);
    });
  } catch(e) { console.error('Supabase:', e); }
}
loadAkiyaPins();
