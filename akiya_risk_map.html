<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空き家リスクマップ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
    #map { position:fixed; top:0; bottom:0; left:0; right:0; }
    .panel {
      position:fixed; z-index:1000;
      background:rgba(255,255,255,0.97);
      border-radius:8px; border:1px solid #bbb;
      box-shadow:2px 2px 8px rgba(0,0,0,0.2);
      font-family:sans-serif; font-size:12px;
    }
    .ph { font-weight:bold; font-size:13px; border-bottom:2px solid #555;
          padding-bottom:4px; margin-bottom:8px; }
    .sl { font-size:11px; font-weight:bold; color:#444; margin-bottom:4px; }
    label.cl { display:block; margin-bottom:2px; cursor:pointer; }
  </style>
</head>
<body>
<div id="map"></div>

<!-- タイトル -->
<div style="position:fixed;top:10px;left:50%;transform:translateX(-50%);
            z-index:1100;background:rgba(255,255,255,0.93);padding:8px 20px;
            border-radius:6px;border:1px solid #aaa;font-size:15px;font-weight:bold;
            pointer-events:none;white-space:nowrap;font-family:sans-serif">
  空き家リスクマップ
</div>

<!-- ズームインジケーター -->
<div style="position:fixed;bottom:20px;right:10px;z-index:1100;
     background:rgba(255,255,255,0.93);padding:6px 12px;border-radius:6px;
     border:1px solid #aaa;font-family:sans-serif;font-size:12px;pointer-events:none">
  ズーム: <span id="zoom-value" style="font-weight:bold">14</span>
</div>

<!-- コントロールパネル -->
<div class="panel" style="top:10px;right:10px;padding:10px 12px;width:200px;max-height:90vh;overflow-y:auto">
  <div class="ph">レイヤー制御</div>

  <div class="sl">ベースマップ</div>
  <label class="cl">
    <input type="radio" name="basemap" value="aerial" checked
           onchange="switchBasemap(this.value)"> 航空写真
  </label>
  <label class="cl" style="margin-bottom:8px">
    <input type="radio" name="basemap" value="street"
           onchange="switchBasemap(this.value)"> 標準地図
  </label>

  <div class="sl">建物ポリゴン（国土地理院）</div>
  <label class="cl">
    <input type="checkbox" id="chk-gsi-bldg" checked
           onchange="_applyVisibility()"> 地理院建物ポリゴン
  </label>
  <div id="status-gsi" style="font-size:10px;color:#888;margin:0 0 4px 18px"></div>
  <label class="cl" style="margin-bottom:8px">
    <input type="checkbox" id="chk-risk-high" onchange="_onFilterChange()"> リスク高のみ表示
  </label>

  <div class="sl">その他</div>
  <label class="cl">
    <input type="checkbox" id="chk-mixed" checked
           onchange="_applyVisibility()"> 混在リスクグリッド
  </label>
  <div id="status-mixed" style="font-size:10px;color:#888;margin:0 0 4px 18px"></div>
  <label class="cl" style="margin-bottom:8px">
    <input type="checkbox" id="chk-akiya" checked
           onchange="toggleLayer(akiyaLayer, this.checked)"> 空き家マップ ピン
  </label>
</div>

<!-- 凡例 -->
<div class="panel" style="bottom:20px;left:10px;padding:10px 14px;line-height:2.0">
  <b style="font-size:12px">建物敷地面積</b><br>
  <span style="display:inline-block;width:14px;height:14px;background:#E24B4A;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 広（100㎡以上）リスク高<br>
  <span style="display:inline-block;width:14px;height:14px;background:#EF9F27;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 中（60〜100㎡）リスク中<br>
  <span style="display:inline-block;width:14px;height:14px;background:#1D9E75;vertical-align:middle;border-radius:2px;margin-right:4px"></span>建物 小（60㎡未満）リスク低<br>
  <span style="display:inline-block;width:14px;height:14px;background:#4A90D9;vertical-align:middle;border-radius:2px;margin-right:4px;opacity:0.8"></span>建物（広域 ズーム15以下）<br>
  <span style="display:inline-block;width:14px;height:14px;background:rgba(155,48,255,0.45);vertical-align:middle;border-radius:2px;margin-right:4px;border:1px solid #9B30FF"></span>混在（広＋小 5棟以上グリッド）<br>
  <hr style="margin:4px 0">
  <small style="color:#666">建物: 国土地理院 基盤地図情報</small>
</div>

<script>
// ── マップ初期化 ────────────────────────────────────────────
var map = L.map('map', {center: [26.155, 127.675], zoom: 14, maxZoom: 20});
console.log('[GSI] ▶ akiya_risk_map 初期化開始');
window.addEventListener('load', function() {
  map.invalidateSize();
  _updateZoomIndicator();
  _applyVisibility();
});
map.on('zoom',    _updateZoomIndicator);
map.on('zoomend', function() { _updateZoomIndicator(); _clearDetailCache(); _applyVisibility(); });
map.on('moveend', _applyVisibility);

// ── ベースマップ ────────────────────────────────────────────
var aerialLayer = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {attribution:'Esri World Imagery', maxZoom:20}
).addTo(map);

var streetLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'CartoDB', subdomains:'abcd', maxZoom:20}
);

function _updateZoomIndicator() {
  var el = document.getElementById('zoom-value');
  if (el) el.textContent = map.getZoom().toFixed(1);
}
function toggleLayer(layer, show) { show ? map.addLayer(layer) : map.removeLayer(layer); }
function switchBasemap(val) {
  if (val === 'aerial') { map.removeLayer(streetLayer); map.addLayer(aerialLayer); }
  else { map.removeLayer(aerialLayer); map.addLayer(streetLayer); }
}

// ── 建物ポリゴン（OSM Overpass API） ─────────────────────────
// 複数エンドポイントを順番に試し、最初に成功したものを使う
var OVERPASS_ENDPOINTS = [
  'https://lz4.overpass-api.de/api/interpreter',
  'https://overpass.osm.rambler.ru/cgi/interpreter',
  'https://overpass-api.de/api/interpreter'
];
var GSI_DETAIL_ZOOM = 16;
var MIXED_MIN_COUNT = 5;

console.log('[OSM] 初期設定 endpoints='+OVERPASS_ENDPOINTS.length+' GSI_DETAIL_ZOOM='+GSI_DETAIL_ZOOM);

var _gsiDetailLayer = L.layerGroup();
var _gsiPolygons    = [];   // 各エントリは {poly, cat, lat, lng, osmId}
var _fetchGen       = 0;    // キャッシュクリアごとにインクリメント、古いフェッチを破棄
var _bldgTimer      = null;
var _canvasR        = L.canvas({padding: 0.5});

// 外周リング面積（ショーレース）ring: [[lng,lat],...]
function _ringArea(ring) {
  var LAT_M = 111000, LNG_M = 111000 * Math.cos(26.15 * Math.PI / 180);
  var a = 0, n = ring.length;
  for (var i = 0; i < n; i++) {
    var j = (i + 1) % n;
    a += (ring[i][0] * LNG_M) * (ring[j][1] * LAT_M)
       - (ring[j][0] * LNG_M) * (ring[i][1] * LAT_M);
  }
  return Math.abs(a) / 2;
}

function _clearDetailCache() {
  _fetchGen++;              // 進行中のフェッチを無効化
  _gsiPolygons = [];
  _gsiDetailLayer.clearLayers();
  _setGsiStatus('');
  console.log('[OSM] キャッシュクリア gen='+_fetchGen);
}

// エンドポイントを順番に試す（失敗したら次へ）
function _fetchOverpass(query, idx) {
  if (idx >= OVERPASS_ENDPOINTS.length) return Promise.reject(new Error('all endpoints failed'));
  var url = OVERPASS_ENDPOINTS[idx];
  console.log('[OSM] try endpoint[' + idx + ']', url);
  return fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'data=' + encodeURIComponent(query)
  }).then(function(r) {
    console.log('[OSM] status', r.status, r.headers.get('content-type'), url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).catch(function(e) {
    console.warn('[OSM] endpoint failed:', url, e.message);
    return _fetchOverpass(query, idx + 1);
  });
}

// 可視範囲の building=* を Overpass から取得（500ms デバウンス）
function _loadDetailTiles() {
  clearTimeout(_bldgTimer);
  _bldgTimer = setTimeout(function() {
    var gen = _fetchGen;   // このフェッチの世代を記録
    var b = map.getBounds();
    var s = b.getSouth().toFixed(5), w = b.getWest().toFixed(5);
    var n = b.getNorth().toFixed(5), e = b.getEast().toFixed(5);
    var query = '[out:json][timeout:25];way["building"](' + s + ',' + w + ',' + n + ',' + e + ');out geom;';
    _setGsiStatus('読み込み中...');
    console.log('[OSM] fetch start gen='+gen+' zoom='+map.getZoom().toFixed(1)+' S='+s+' W='+w+' N='+n+' E='+e);
    _fetchOverpass(query, 0)
      .then(function(data) {
        if (_fetchGen !== gen) {
          console.log('[OSM] 古いフェッチを破棄 (gen '+gen+' → 現在'+_fetchGen+')');
          return;
        }
        try { _parseOverpass(data); }
        catch(e) { console.error('[OSM] parse error', e.message); }
      })
      .catch(function(e) { console.error('[OSM] all endpoints failed:', e.message); })
      .finally(function() { if (_fetchGen === gen) _updateGsiStatus(); });
  }, 500);
}

// Overpass JSON → _gsiDetailLayer にポリゴン追加
function _parseOverpass(data) {
  if (!data || !data.elements) {
    console.warn('[OSM] _parseOverpass: data or data.elements が null/undefined', data);
    return;
  }
  console.log('[OSM] _parseOverpass: elements.length='+data.elements.length+' version='+data.version);

  // 最初の要素をサンプルログ（フォーマット確認用）
  if (data.elements.length > 0) {
    var s0 = data.elements[0];
    console.log('[OSM] sample[0] type='+s0.type+' id='+s0.id
      +' geom='+(s0.geometry ? s0.geometry.length+'pts' : 'undefined')
      +' first='+(s0.geometry && s0.geometry[0] ? JSON.stringify(s0.geometry[0]) : '-'));
  }

  // _bldgDoneIds は廃止。_gsiPolygons の osmId から重複チェックを導出。
  // これにより _gsiPolygons クリア後に古いIDが残る競合状態を防ぐ。
  var existingIds = {};
  _gsiPolygons.forEach(function(p) { existingIds[p.osmId] = true; });

  var added = 0, dup = 0, skipNotWay = 0, skipNoGeom = 0, skipArea = 0;

  data.elements.forEach(function(el) {
    if (el.type !== 'way') { skipNotWay++; return; }
    if (!el.geometry || el.geometry.length < 3) { skipNoGeom++; return; }
    if (existingIds[el.id]) { dup++; return; }

    var ring = el.geometry.map(function(p) { return [p.lon, p.lat]; });
    var area = _ringArea(ring);
    if (area <= 0 || area > 100000) { skipArea++; return; }

    var cat, color, label;
    if (area >= 100)     { cat='high'; color='#E24B4A'; label='広（100㎡以上）'; }
    else if (area >= 60) { cat='mid';  color='#EF9F27'; label='中（60〜100㎡）'; }
    else                 { cat='low';  color='#1D9E75'; label='小（60㎡未満）'; }

    var coords = el.geometry.map(function(p) { return [p.lat, p.lon]; });
    var cLat = 0, cLng = 0;
    coords.forEach(function(c) { cLat += c[0]; cLng += c[1]; });
    cLat /= coords.length; cLng /= coords.length;

    var poly = L.polygon(coords, {
      color: '#fff', weight: 0.5, fillColor: color, fillOpacity: 0.65,
      renderer: _canvasR
    }).bindTooltip(Math.round(area) + '㎡ — ' + label, {sticky: true});

    _gsiPolygons.push({poly: poly, cat: cat, lat: cLat, lng: cLng, osmId: el.id});
    existingIds[el.id] = true;   // 同一フェッチ内での二重追加も防ぐ
    added++;
  });

  console.log('[OSM] added='+added+' dup='+dup
    +' skipNotWay='+skipNotWay+' skipNoGeom='+skipNoGeom+' skipArea='+skipArea
    +' total_polys='+_gsiPolygons.length);

  // dup のみの場合はキャッシュ済みなので警告不要
  if (added === 0 && (skipNotWay + skipNoGeom + skipArea) > 0) {
    console.warn('[OSM] !! 全件スキップ — skipNotWay='+skipNotWay
      +' skipNoGeom='+skipNoGeom+' skipArea='+skipArea);
  }

  if (added > 0) {
    // showing変数のタイミング問題を回避: 常に _rebuildDetailLayer で再描画
    // （非同期フェッチ中のズーム/チェック変化にも対応）
    _rebuildDetailLayer();
    _updateGsiStatus();
    _updateMixedGrid();
  }
}

function _setGsiStatus(text, color) {
  var el = document.getElementById('status-gsi');
  if (!el) return;
  el.style.color = color || '#888';
  el.textContent = text;
}
function _updateGsiStatus() {
  _setGsiStatus(_gsiPolygons.length.toLocaleString()+'棟分析済', '#1a7a4a');
}

// riskHighOnly チェック変更時
function _onFilterChange() {
  var zoom = Math.round(map.getZoom());
  if (zoom >= GSI_DETAIL_ZOOM && map.hasLayer(_gsiDetailLayer)) {
    _rebuildDetailLayer();
  }
}

function _rebuildDetailLayer() {
  var riskHighOnly = document.getElementById('chk-risk-high').checked;
  _gsiDetailLayer.clearLayers();
  _gsiPolygons.forEach(function(item) {
    if (item.cat==='high' || !riskHighOnly) item.poly.addTo(_gsiDetailLayer);
  });
}

// ズーム・チェックボックスに応じてレイヤー切替
function _applyVisibility() {
  var zoom  = Math.round(map.getZoom());
  var gsiOn = document.getElementById('chk-gsi-bldg').checked;
  console.log('[GSI] _applyVisibility zoom='+zoom+' gsiOn='+gsiOn);

  if (!gsiOn) {
    console.log('[OSM] 建物レイヤーOFF');
    if (map.hasLayer(_gsiDetailLayer)) map.removeLayer(_gsiDetailLayer);
  } else if (zoom < GSI_DETAIL_ZOOM) {
    console.log('[OSM] ズーム不足 (zoom='+zoom+' < '+GSI_DETAIL_ZOOM+') → 建物非表示');
    if (map.hasLayer(_gsiDetailLayer)) map.removeLayer(_gsiDetailLayer);
  } else {
    console.log('[OSM] 詳細モード (zoom='+zoom+') → Overpass取得開始');
    _rebuildDetailLayer();
    if (!map.hasLayer(_gsiDetailLayer)) map.addLayer(_gsiDetailLayer);
    _loadDetailTiles();
  }

  // 混在グリッド
  var mixedOn = document.getElementById('chk-mixed').checked;
  if (mixedOn) { if (!map.hasLayer(mixedGridLayer)) map.addLayer(mixedGridLayer); }
  else         { if ( map.hasLayer(mixedGridLayer)) map.removeLayer(mixedGridLayer); }
}

// ── 混在リスクグリッド（建物密度 5棟以上のみ表示） ──────────────
var GRID_LAT = 100/111000;
var GRID_LNG = 100/(111000*Math.cos(26.15*Math.PI/180));
var GRID_ORIGIN_LAT = 26.05;
var GRID_ORIGIN_LNG = 127.59;
var mixedGridLayer = L.layerGroup().addTo(map);

function _updateMixedGrid() {
  var cells = {};
  _gsiPolygons.forEach(function(item) {
    var r = Math.floor((item.lat - GRID_ORIGIN_LAT)/GRID_LAT);
    var c = Math.floor((item.lng - GRID_ORIGIN_LNG)/GRID_LNG);
    var k = r+'_'+c;
    if (!cells[k]) cells[k]={hasHigh:false, hasLow:false, count:0, r:r, c:c};
    cells[k].count++;
    if (item.cat==='high') cells[k].hasHigh=true;
    if (item.cat==='low')  cells[k].hasLow =true;
  });
  mixedGridLayer.clearLayers();
  var cnt=0;
  Object.keys(cells).forEach(function(k) {
    var cell=cells[k];
    // 広＋小の混在 かつ 5棟以上のグリッドのみ表示（農地・森林を除外）
    if (!cell.hasHigh || !cell.hasLow || cell.count < MIXED_MIN_COUNT) return;
    var lat1=GRID_ORIGIN_LAT+cell.r*GRID_LAT, lng1=GRID_ORIGIN_LNG+cell.c*GRID_LNG;
    L.rectangle([[lat1,lng1],[lat1+GRID_LAT,lng1+GRID_LNG]], {
      color:'#9B30FF', weight:1, fillColor:'#9B30FF', fillOpacity:0.35
    }).bindTooltip('混在エリア（広＋小 計'+cell.count+'棟）',{sticky:true}).addTo(mixedGridLayer);
    cnt++;
  });
  var el=document.getElementById('status-mixed');
  if (el) { el.style.color=cnt>0?'#6600cc':'#888'; el.textContent=cnt>0?cnt+'グリッド検出':'検出なし'; }
}

// ── 空き家マップ Supabase連携 ──────────────────────────────
var SB_URL='https://okijwcasxxwqmhofndeg.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9raWp3Y2FzeHh3cW1ob2ZuZGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTg5MjgsImV4cCI6MjA5NDc5NDkyOH0.rdp7YZw-Qm6BMzbJTn8BznvgP5vcq7jq0IPVg0F_QHw';
var akiyaLayer = L.layerGroup().addTo(map);

async function loadAkiyaPins() {
  try {
    var res = await fetch(
      SB_URL+'/rest/v1/akiya_records?order=created_at.desc&limit=500&select=id,address,score,gps,judge,cond',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}
    );
    var data = await res.json();
    if (!Array.isArray(data)) return;
    akiyaLayer.clearLayers();
    data.forEach(function(r) {
      if (!r.gps||!r.gps.lat||!r.gps.lng) return;
      var score=r.score||0;
      var color=score>=15?'#E24B4A':score>=7?'#EF9F27':'#1D9E75';
      var icon=L.divIcon({
        className:'',
        html:'<div style="width:30px;height:30px;background:'+color+';border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;line-height:1;">'+score+'</div>',
        iconSize:[30,30], iconAnchor:[15,15]
      });
      L.marker([r.gps.lat,r.gps.lng],{icon:icon}).bindPopup(
        '<div style="font-size:12px;min-width:170px;font-family:sans-serif">'+
        '<div style="font-weight:700;margin-bottom:5px;line-height:1.4">'+(r.address||'住所不明')+'</div>'+
        '<div style="margin-bottom:2px">スコア: <strong style="color:'+color+';font-size:14px">'+score+'</strong></div>'+
        '<div style="margin-bottom:2px">判定: '+(r.judge||'-')+'</div>'+
        '<div>状態: '+(r.cond||'-')+'</div></div>'
      ).addTo(akiyaLayer);
    });
  } catch(e) { console.error('Supabase:', e); }
}
loadAkiyaPins();
</script>
</body>
</html>
